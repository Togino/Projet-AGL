<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #f4efe7;
            color: #1c2430;
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }
        .card {
            background: #fffaf2;
            border: 1px solid #d6c7ae;
            border-radius: 16px;
            padding: 18px;
        }
        form {
            display: grid;
            gap: 10px;
        }
        input, select, textarea, button {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #cdbfa8;
            font: inherit;
        }
        button {
            background: #0f766e;
            color: #fff;
            cursor: pointer;
        }
        pre {
            white-space: pre-wrap;
            background: #f2e7d5;
            padding: 12px;
            border-radius: 12px;
            min-height: 120px;
        }
        .status {
            background: #e6f5f2;
            border: 1px solid #b7ddd8;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Console admin de test</h1>
        <div id="status" class="status">Session non connectee.</div>
        <div class="grid">
            <section class="card">
                <h2>Connexion</h2>
                <form id="loginForm">
                    <input name="email" type="email" value="admin@scolarsys.test" required>
                    <input name="motdepasse" type="password" value="Admin1234!" required>
                    <button type="submit">Se connecter</button>
                </form>
                <button id="meButton" type="button">Charger ma session</button>
                <button id="logoutButton" type="button">Se deconnecter</button>
            </section>

            <section class="card">
                <h2>Creation utilisateur</h2>
                <form id="createUserForm">
                    <input name="matricule" value="GE-0002" required>
                    <input name="nom" value="Traore" required>
                    <input name="prenom" value="Awa" required>
                    <input name="date_de_naissance" type="date" value="1998-03-10" required>
                    <input name="email" type="email" value="awa.traore@test.local" required>
                    <input name="motdepasse" type="password" value="Secure123" required>
                    <select id="roleSelect" name="role_id"></select>
                    <select name="statut">
                        <option value="1">actif</option>
                        <option value="0">inactif</option>
                    </select>
                    <button type="submit">Creer</button>
                </form>
            </section>

            <section class="card">
                <h2>Permissions role</h2>
                <form id="permissionsForm">
                    <select id="rolePicker" name="role_id"></select>
                    <textarea id="permissionIds" rows="4" placeholder="1,2,3"></textarea>
                    <button type="submit">Mettre a jour</button>
                </form>
            </section>

            <section class="card">
                <h2>Reponse API</h2>
                <pre id="output">En attente...</pre>
            </section>

            <section class="card">
                <h2>Logs securite</h2>
                <button id="logsButton" type="button">Charger les logs</button>
                <pre id="logsOutput">Aucun log charge.</pre>
            </section>
        </div>
    </div>

    <script>
        let csrfToken = null;
        const output = document.getElementById('output');
        const logsOutput = document.getElementById('logsOutput');
        const statusBox = document.getElementById('status');
        const roleSelect = document.getElementById('roleSelect');
        const rolePicker = document.getElementById('rolePicker');

        function show(target, data) {
            target.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }

        async function api(path, options = {}) {
            const headers = options.headers || {};
            if (csrfToken) {
                headers['X-CSRF-Token'] = csrfToken;
            }

            const response = await fetch(path, {
                credentials: 'same-origin',
                ...options,
                headers
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw data;
            }

            return data;
        }

        async function loadRoles() {
            const data = await api('/admin/roles');
            roleSelect.innerHTML = '';
            rolePicker.innerHTML = '';

            data.data.forEach((role) => {
                const optionA = document.createElement('option');
                optionA.value = role.id;
                optionA.textContent = `${role.name} (#${role.id})`;
                roleSelect.appendChild(optionA);

                const optionB = document.createElement('option');
                optionB.value = role.id;
                optionB.textContent = `${role.name} (#${role.id})`;
                rolePicker.appendChild(optionB);
            });
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
                const payload = Object.fromEntries(new FormData(event.target).entries());
                const data = await api('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                csrfToken = data.data.csrf_token;
                statusBox.textContent = `Connecte en tant que ${data.data.email}`;
                show(output, data);
                await loadRoles();
            } catch (error) {
                show(output, error);
            }
        });

        document.getElementById('meButton').addEventListener('click', async () => {
            try {
                const data = await api('/me');
                csrfToken = data.data.csrf_token;
                statusBox.textContent = `Session active pour ${data.data.email}`;
                show(output, data);
                await loadRoles();
            } catch (error) {
                show(output, error);
            }
        });

        document.getElementById('logoutButton').addEventListener('click', async () => {
            try {
                const data = await api('/logout', { method: 'POST' });
                csrfToken = null;
                statusBox.textContent = 'Session fermee.';
                show(output, data);
            } catch (error) {
                show(output, error);
            }
        });

        document.getElementById('createUserForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
                const payload = Object.fromEntries(new FormData(event.target).entries());
                const data = await api('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                show(output, data);
            } catch (error) {
                show(output, error);
            }
        });

        document.getElementById('permissionsForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
                const roleId = rolePicker.value;
                const permissionIds = document.getElementById('permissionIds').value
                    .split(',')
                    .map((value) => value.trim())
                    .filter(Boolean)
                    .map((value) => Number(value));

                const data = await api(`/admin/roles/${roleId}/permissions`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ permission_ids: permissionIds })
                });
                show(output, data);
            } catch (error) {
                show(output, error);
            }
        });

        document.getElementById('logsButton').addEventListener('click', async () => {
            try {
                const data = await api('/admin/security-logs?limit=20');
                show(logsOutput, data);
            } catch (error) {
                show(logsOutput, error);
            }
        });
    </script>
</body>
</html>
